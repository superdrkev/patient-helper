<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Patient Intake Helper</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.5; }
    h1 { margin-bottom: 0.2em; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    textarea, input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .result { margin-top: 25px; padding: 18px; border-radius: 6px; background: #eef6ff; border: 1px solid #bcd4ff; display: none; }
    .section { margin-bottom: 12px; border: 1px solid #d0d7e2; border-radius: 6px; background: #f7faff; }
    .section-header { padding: 8px 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
    .section-body { padding: 10px; display: none; white-space: pre-line; }
    .toggle { font-size: 13px; color: #3366cc; }
    .intro-block { background: #ffffff; border-left: 4px solid #4a90e2; padding: 12px 14px; margin-bottom: 18px; border-radius: 4px; }
    .hpi-box { background: #fff; border: 1px solid #ccc; padding: 12px; margin-top: 20px; border-radius: 6px; }
  </style>
</head>

<body>

<h1>Patient Intake Helper</h1>

<form id="intakeForm">
  <label>Main question</label>
  <textarea id="question" rows="3" required></textarea>

  <label>Symptoms (optional)</label>
  <textarea id="symptoms" rows="2"></textarea>

  <label>Medications (optional)</label>
  <textarea id="medications" rows="2"></textarea>

  <button type="submit">Submit</button>
</form>

<div id="result" class="result">
  <div id="resultContent"></div>
</div>

<div id="hpiContainer" class="hpi-box" style="display:none;"></div>

<script>
/* -------------------------------
   1. Expand/Collapse Logic
--------------------------------*/
function toggleSection(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector(".toggle");
  const open = body.style.display === "block";
  body.style.display = open ? "none" : "block";
  toggle.textContent = open ? "[expand]" : "[collapse]";
}

/* -------------------------------
   2. Render a Symptom Module
--------------------------------*/
function renderModule(symptomName, moduleData) {
  const container = document.createElement("div");

  const sections = [
    ["Overview", moduleData.overview],
    ["Common associated symptoms", moduleData.associated_symptoms],
    ["Patterns", moduleData.patterns],
    ["Information to gather", moduleData.info_to_gather],
    ["Possible diagnoses (common causes)", moduleData.possible_diagnoses],
    ["Typical management themes", moduleData.management],
    ["When to seek care", moduleData.seek_care],
    ["Urgent reasons", moduleData.urgent],
    ["Typical course", moduleData.course]
  ];

  sections.forEach(([title, bodyText]) => {
    const wrapper = document.createElement("div");
    wrapper.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";
    header.onclick = () => toggleSection(header);
    header.innerHTML = `<span>${symptomName} – ${title}</span><span class="toggle">[expand]</span>`;

    const body = document.createElement("div");
    body.className = "section-body";
    body.textContent = bodyText;

    wrapper.appendChild(header);
    wrapper.appendChild(body);
    container.appendChild(wrapper);
  });

  return container;
}

/* -------------------------------
   3. HPI Builder
--------------------------------*/
let hpiQuestions = [];
let hpiAnswers = {};
let hpiIndex = 0;

function startHPI(symptoms) {
  callLLM_HPIQuestions(symptoms).then(data => {
    hpiQuestions = data.questions;
    hpiIndex = 0;
    hpiAnswers = {};
    askNextHPI();
  });
}

function askNextHPI() {
  const box = document.getElementById("hpiContainer");
  box.style.display = "block";

  if (hpiIndex >= hpiQuestions.length) {
    return finalizeHPI();
  }

  const q = hpiQuestions[hpiIndex];
  box.innerHTML = `
    <p><strong>${q}</strong></p>
    <textarea id="hpiAnswer" rows="3"></textarea>
    <button onclick="saveHPI()">Next</button>
  `;
}

function saveHPI() {
  const answer = document.getElementById("hpiAnswer").value.trim();
  hpiAnswers[hpiQuestions[hpiIndex]] = answer;
  hpiIndex++;
  askNextHPI();
}

function finalizeHPI() {
  callLLM_HPIBuild(hpiAnswers).then(summary => {
    const box = document.getElementById("hpiContainer");
    box.innerHTML = `
      <h3>Editable HPI Summary</h3>
      <textarea rows="10" style="width:100%;">${summary}</textarea>
    `;
  });
}

/* -------------------------------
   4. LLM Calls (Replace with your API)
--------------------------------*/
async function callLLM(prompt) {
  // Replace this with your actual API call
  console.log("LLM PROMPT:", prompt);
  return {
    intro: "Example intro from LLM.",
    symptoms_detected: ["cough"],
    modules: {
      cough: {
        overview: "Full overview...",
        associated_symptoms: "Full text...",
        patterns: "Full text...",
        info_to_gather: "Full text...",
        possible_diagnoses: "Full text...",
        management: "Full text...",
        seek_care: "Full text...",
        urgent: "Full text...",
        course: "Full text..."
      }
    },
    medication_notes: ["Example medication note."]
  };
}

async function callLLM_HPIQuestions(symptoms) {
  return {
    questions: [
      "When did the symptom start?",
      "Has it changed over time?",
      "What makes it better or worse?"
    ]
  };
}

async function callLLM_HPIBuild(hpiData) {
  return "Example HPI summary based on answers.";
}

/* -------------------------------
   5. Main Intake Handler
--------------------------------*/
document.getElementById("intakeForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const question = document.getElementById("question").value;
  const symptoms = document.getElementById("symptoms").value;
  const medications = document.getElementById("medications").value;

  const prompt = `
You are assisting a patient-facing medical information tool...
[THE FULL PROMPT GOES HERE — OMITTED FOR BREVITY]
  `;

  const data = await callLLM(prompt);

  const result = document.getElementById("result");
  const content = document.getElementById("resultContent");
  content.innerHTML = "";

  const intro = document.createElement("div");
  intro.className = "intro-block";
  intro.textContent = data.intro;
  content.appendChild(intro);

  data.symptoms_detected.forEach(sym => {
    const module = renderModule(sym, data.modules[sym]);
    content.appendChild(module);
  });

  if (data.medication_notes.length > 0) {
    const medSection = document.createElement("div");
    medSection.className = "section";
    medSection.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <span>Medication Notes</span><span class="toggle">[expand]</span>
      </div>
      <div class="section-body">${data.medication_notes.join("\n")}</div>
    `;
    content.appendChild(medSection);
  }

  const hpiButton = document.createElement("button");
  hpiButton.textContent = "Start HPI";
  hpiButton.onclick = () => startHPI(data.symptoms_detected);
  content.appendChild(hpiButton);

  result.style.display = "block";
});
</script>

</body>
</html>
